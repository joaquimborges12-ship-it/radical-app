<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Radical Motos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0;
    --text: #111111; --text2: #555555; --text3: #999999; --red: #cc0000;
  }
  body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

  .topbar { background: #000; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
  .topbar img { width: 36px; height: 36px; border-radius: 8px; }
  .topbar-title { color: #fff; font-size: 16px; font-weight: bold; letter-spacing: 0.03em; }
  .topbar-sub { color: #aaa; font-size: 11px; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; z-index: 50; }
  .nav-btn { flex: 1; padding: 10px 2px; text-align: center; color: #888; cursor: pointer; font-size: 9px; border-top: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .nav-btn.active { color: #fff; border-top-color: #fff; }
  .nav-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  .search-box { width: 100%; padding: 13px 16px; font-size: 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text); outline: none; margin-bottom: 12px; -webkit-appearance: none; }
  .search-box:focus { border-color: #000; }

  .item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
  .item:active { background: #f9f9f9; }
  .item-nome { font-size: 14px; font-weight: bold; color: var(--text); line-height: 1.4; }
  .item-loc { margin-top: 4px; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .loc-badge { display: inline-block; background: #f0f0f0; border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: bold; color: #333; font-family: monospace; }
  .item-preco { margin-top: 4px; font-size: 13px; color: #1a6b1a; font-weight: bold; }
  .result-count { font-size: 12px; color: var(--text3); margin-bottom: 10px; padding-left: 2px; }
  .empty-msg { text-align: center; padding: 40px 16px; color: var(--text3); font-size: 14px; }

  /* PRATELEIRAS */
  .grupo-titulo { font-size: 11px; font-weight: bold; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 10px; padding-left: 2px; }
  .grupo-titulo:first-child { margin-top: 0; }
  .secoes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .secao-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px; cursor: pointer; text-align: center; transition: border-color 0.15s, transform 0.1s; }
  .secao-card:active { transform: scale(0.96); border-color: #000; }
  .secao-nome { font-size: 16px; font-weight: bold; color: var(--text); font-family: monospace; letter-spacing: 0.05em; }
  .secao-qtd { font-size: 12px; color: var(--text3); margin-top: 5px; }
  .secao-icone { font-size: 20px; margin-bottom: 8px; display: block; }

  .prat-back-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .prat-back-btn { background: #000; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
  .prat-titulo { font-size: 16px; font-weight: bold; color: var(--text); }
  .prat-count { font-size: 12px; color: var(--text3); margin-left: auto; }

  .prat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .prat-item-body { flex: 1; min-width: 0; }
  .prat-item-nome { font-size: 14px; font-weight: bold; color: var(--text); line-height: 1.4; }
  .prat-item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; flex-wrap: wrap; gap: 4px; }
  .prat-item-loc { font-size: 12px; font-family: monospace; color: #555; background: #f0f0f0; padding: 2px 8px; border-radius: 6px; border: 1px solid var(--border); }
  .prat-item-preco { font-size: 13px; color: #1a6b1a; font-weight: bold; }
  .prat-add-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #000; background: #fff; color: #000; font-size: 22px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, color 0.15s, transform 0.1s; }
  .prat-add-btn:active { transform: scale(0.9); }
  .prat-add-btn.adicionado { background: #1a6b1a; border-color: #1a6b1a; color: #fff; }
  .subloc-titulo { font-size: 12px; font-weight: bold; color: #555; background: #ebebeb; border-radius: 6px; padding: 5px 10px; margin: 12px 0 6px; font-family: monospace; display: inline-block; }

  /* PEDIDOS */
  .pedido-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .pedido-selector::-webkit-scrollbar { display: none; }
  .pedido-chip { white-space: nowrap; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text2); flex-shrink: 0; }
  .pedido-chip.active { background: #000; color: #fff; border-color: #000; }
  .pedido-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .btn { font-family: Arial, sans-serif; font-size: 13px; padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; white-space: nowrap; }
  .btn:active { opacity: 0.75; }
  .btn-black { background: #000; color: #fff; border-color: #000; }
  .btn-red { color: var(--red); border-color: #f5c6c2; }
  .btn-green { background: #1a6b1a; color: #fff; border-color: #1a6b1a; }
  .pedido-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 12px; }
  .pedido-box-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
  .pedido-linha { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .pedido-linha:last-child { border-bottom: none; }
  .pedido-linha-num { font-size: 12px; color: var(--text3); min-width: 22px; padding-top: 2px; }
  .pedido-linha-nome { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
  .pedido-linha-loc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .remover-btn { font-size: 12px; color: var(--red); cursor: pointer; white-space: nowrap; padding: 2px 6px; border-radius: 6px; border: 1px solid #f5c6c2; background: transparent; flex-shrink: 0; }
  .pedido-vazio { text-align: center; padding: 24px; color: var(--text3); font-size: 14px; }

  /* MOTOS */
  .moto-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .moto-header h2 { font-size: 16px; font-weight: bold; color: var(--text); }
  .moto-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .moto-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .moto-modelo { font-size: 15px; font-weight: bold; color: var(--text); }
  .moto-cliente { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .moto-tel { font-size: 13px; color: #185FA5; margin-top: 2px; }
  .moto-desc { font-size: 13px; color: var(--text); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); line-height: 1.5; }
  .moto-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 6px; }
  .moto-data { font-size: 11px; color: var(--text3); }
  .moto-status { font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 20px; cursor: pointer; }
  .moto-status.pendente { background: #FDF3DC; color: #6B4700; }
  .moto-status.pronto { background: #E6F2E8; color: #1a4d23; }
  .moto-acoes { display: flex; gap: 6px; }
  .moto-empty { text-align: center; padding: 40px 16px; color: var(--text3); font-size: 14px; }

  .form-nova-moto { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: none; }
  .form-nova-moto.open { display: block; }
  .form-nova-moto h3 { font-size: 15px; font-weight: bold; margin-bottom: 14px; color: var(--text); }
  .form-field { margin-bottom: 10px; }
  .form-field label { display: block; font-size: 11px; font-weight: bold; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .form-field input, .form-field textarea { width: 100%; padding: 11px 12px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; font-family: Arial, sans-serif; }
  .form-field input:focus, .form-field textarea:focus { border-color: #000; background: #fff; }
  .form-field textarea { height: 80px; resize: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 500px; }
  .modal h3 { font-size: 16px; margin-bottom: 14px; }
  .modal input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; outline: none; }
  .modal input:focus { border-color: #000; }
  .modal-btns { display: flex; gap: 8px; }

  #loading { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: #fff; }
  #loading img { width: 100px; border-radius: 20px; margin-bottom: 20px; }
  #loading p { font-size: 14px; color: #aaa; }
</style>
</head>
<body>

<div id="loading">
  <img src="icon-180.png" alt="Radical">
  <p>Carregando estoque...</p>
</div>

<div class="topbar">
  <img src="icon-180.png" alt="Logo">
  <div>
    <div class="topbar-title">Radical Motos</div>
    <div class="topbar-sub" id="total-produtos">carregando...</div>
  </div>
</div>

<!-- ESTOQUE -->
<div class="view" id="view-estoque">
  <input class="search-box" id="search1" placeholder="Buscar peça ou localização..." oninput="buscarEstoque()" autocomplete="off" autocorrect="off" spellcheck="false">
  <div id="resultado-count" class="result-count"></div>
  <div id="lista1"></div>
</div>

<!-- PRATELEIRAS -->
<div class="view" id="view-prateleiras">
  <div id="prat-secoes">
    <div id="prat-secoes-lista"></div>
  </div>
  <div id="prat-detalhe" style="display:none">
    <div class="prat-back-bar">
      <button class="prat-back-btn" onclick="voltarPrateleiras()">← Voltar</button>
      <span class="prat-titulo" id="prat-titulo"></span>
      <span class="prat-count" id="prat-count"></span>
    </div>
    <input class="search-box" id="prat-search" placeholder="Filtrar nesta prateleira..." oninput="filtrarPrateleira()" autocomplete="off">
    <div id="prat-lista"></div>
  </div>
</div>

<!-- PEDIDOS -->
<div class="view" id="view-pedidos">
  <div class="pedido-selector" id="pedido-chips"></div>
  <div class="pedido-actions">
    <button class="btn btn-black" onclick="criarPedido()">+ Novo pedido</button>
    <button class="btn" onclick="abrirRenomear()">Renomear</button>
    <button class="btn btn-red" onclick="excluirPedidoAtual()">Excluir</button>
  </div>
  <input class="search-box" id="search2" placeholder="Buscar e adicionar peça..." oninput="buscarPedidos()" autocomplete="off" autocorrect="off" spellcheck="false">
  <div id="lista2"></div>
  <div class="pedido-box">
    <div class="pedido-box-title">Itens: <span id="nomePedidoAtual"></span></div>
    <div id="pedidoLista"></div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
      <button class="btn btn-green" onclick="copiarPedido()">Copiar lista</button>
      <button class="btn btn-red" onclick="limparPedido()">Limpar</button>
      <button class="btn btn-red" onclick="excluirTodosPedidos()">Excluir todos</button>
    </div>
  </div>
</div>

<!-- MOTOS -->
<div class="view active" id="view-motos">
  <div class="moto-header">
    <h2>Motos em serviço</h2>
    <button class="btn btn-black" onclick="toggleFormMoto()">+ Nova moto</button>
  </div>

  <div class="form-nova-moto" id="form-nova-moto">
    <h3 id="form-moto-titulo">Nova moto</h3>
    <div class="form-field"><label>O que fazer</label><textarea id="m-desc" placeholder="Descreva o serviço ou problema..."></textarea></div>
    <div class="form-row">
      <div class="form-field"><label>Modelo da moto</label><input type="text" id="m-modelo" placeholder="Ex: Honda CG 160"></div>
      <div class="form-field"><label>Placa</label><input type="text" id="m-placa" placeholder="Ex: ABC-1234"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Nome do cliente</label><input type="text" id="m-cliente" placeholder="Nome completo"></div>
      <div class="form-field"><label>Telefone</label><input type="tel" id="m-tel" placeholder="(99) 99999-9999"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn" style="flex:1" onclick="fecharFormMoto()">Cancelar</button>
      <button class="btn btn-black" style="flex:1" onclick="salvarMoto()">Salvar</button>
    </div>
  </div>

  <div id="moto-lista"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-btn active" id="nav-motos" onclick="mudarView('motos')">
    <span class="nav-icon">🏍️</span>Motos
  </div>
  <div class="nav-btn" id="nav-estoque" onclick="mudarView('estoque')">
    <span class="nav-icon">🔍</span>Estoque
  </div>
  <div class="nav-btn" id="nav-prateleiras" onclick="mudarView('prateleiras')">
    <span class="nav-icon">🗄️</span>Prateleiras
  </div>
  <div class="nav-btn" id="nav-pedidos" onclick="mudarView('pedidos')">
    <span class="nav-icon">📋</span>Pedidos
  </div>
</div>

<!-- MODAL RENOMEAR -->
<div class="modal-bg" id="modal-renomear">
  <div class="modal">
    <h3>Renomear pedido</h3>
    <input type="text" id="input-renomear" placeholder="Nome do pedido">
    <div class="modal-btns">
      <button class="btn" style="flex:1" onclick="fecharRenomear()">Cancelar</button>
      <button class="btn btn-black" style="flex:1" onclick="confirmarRenomear()">Salvar</button>
    </div>
  </div>
</div>

<script>
let dados = [];
let pedidos = {};
let pedidoAtual = null;
let secoes = {};
let secaoAtiva = null;
let itensSecaoAtiva = [];

fetch("data.json")
  .then(r => r.json())
  .then(j => {
    dados = j;
    document.getElementById('total-produtos').textContent = dados.length.toLocaleString('pt-BR') + ' produtos';
    document.getElementById('loading').style.display = 'none';
    construirSecoes();
    iniciar();
  })
  .catch(() => {
    document.getElementById('loading').innerHTML = '<p style="color:#f66;padding:20px;text-align:center">Erro ao carregar data.json.</p>';
  });

function adicionarDaPrateleira(btn, nome) {
  const item = dados.find(p => p.nome === nome);
  if (!item) return;
  const jaExiste = pedidos[pedidoAtual].some(p => p.nome === nome);
  if (!jaExiste) {
    pedidos[pedidoAtual].push(item);
    salvar();
    atualizarChips();
  }
  btn.textContent = '✓';
  btn.classList.add('adicionado');
}

function naturalSort(a, b) {
  const re = /(\d+)|(\D+)/g;
  const pa = String(a).toUpperCase().match(re) || [];
  const pb = String(b).toUpperCase().match(re) || [];
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    if (pa[i] === undefined) return -1;
    if (pb[i] === undefined) return 1;
    const na = parseInt(pa[i]), nb = parseInt(pb[i]);
    if (!isNaN(na) && !isNaN(nb)) { if (na !== nb) return na - nb; }
    else { if (pa[i] !== pb[i]) return pa[i] < pb[i] ? -1 : 1; }
  }
  return 0;
}

function normalizar(t) {
  return (t || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// ---- PRATELEIRAS ----
function construirSecoes() {
  secoes = {};
  dados.forEach(p => {
    const loc = p.localizacao || '';
    if (!loc || loc === 'nan') {
      if (!secoes['SEM CÓDIGO']) secoes['SEM CÓDIGO'] = [];
      secoes['SEM CÓDIGO'].push(p);
      return;
    }
    const locUp = loc.toUpperCase();
    // CX separado por número: CX1, CX2, CX3...
    const mCX = locUp.match(/^(CX\d+)/);
    if (mCX) {
      const chave = mCX[1];
      if (!secoes[chave]) secoes[chave] = [];
      secoes[chave].push(p);
      return;
    }
    const m = loc.match(/^([A-Za-z]+)/);
    const chave = m ? m[1].toUpperCase() : 'OUTROS';
    if (!secoes[chave]) secoes[chave] = [];
    secoes[chave].push(p);
  });
  Object.keys(secoes).forEach(k => {
    secoes[k].sort((a, b) => naturalSort(a.localizacao || '', b.localizacao || ''));
  });
  renderSecoes();
}

function iconeSecao(k) {
  if (k === 'SEM CÓDIGO') return '❓';
  if (k.startsWith('DEP')) return '🏭';
  if (k.startsWith('LOJA')) return '🏪';
  if (k.match(/^CX\d/)) return '📦';
  if (k === 'EXPOSITOR' || k === 'ESPOSITOR') return '🖼️';
  return '📌';
}

function renderSecoes() {
  const familias = { 'Depósito': [], 'Loja': [], 'Caixas': [], 'Outros': [], 'Sem código': [] };
  Object.keys(secoes).sort(naturalSort).forEach(k => {
    if (k === 'SEM CÓDIGO') familias['Sem código'].push(k);
    else if (k.startsWith('DEP')) familias['Depósito'].push(k);
    else if (k.startsWith('LOJA')) familias['Loja'].push(k);
    else if (k.match(/^CX\d/)) familias['Caixas'].push(k);
    else familias['Outros'].push(k);
  });

  let html = '';
  Object.entries(familias).forEach(([familia, lista]) => {
    if (!lista.length) return;
    html += `<div class="grupo-titulo">${iconeSecao(lista[0])} ${familia}</div><div class="secoes-grid">`;
    lista.forEach(k => {
      const qtd = secoes[k].length;
      html += `<div class="secao-card" onclick="abrirSecao('${k}')">
        <span class="secao-icone">${iconeSecao(k)}</span>
        <div class="secao-nome">${k}</div>
        <div class="secao-qtd">${qtd} produto${qtd !== 1 ? 's' : ''}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('prat-secoes-lista').innerHTML = html;
}

function abrirSecao(chave) {
  secaoAtiva = chave;
  itensSecaoAtiva = secoes[chave] || [];
  document.getElementById('prat-search').value = '';
  document.getElementById('prat-titulo').textContent = chave;
  document.getElementById('prat-count').textContent = itensSecaoAtiva.length + ' produtos';
  document.getElementById('prat-secoes').style.display = 'none';
  document.getElementById('prat-detalhe').style.display = 'block';
  renderDetalhe(itensSecaoAtiva);
  window.scrollTo(0, 0);
}

function voltarPrateleiras() {
  document.getElementById('prat-detalhe').style.display = 'none';
  document.getElementById('prat-secoes').style.display = 'block';
  secaoAtiva = null;
  window.scrollTo(0, 0);
}

function filtrarPrateleira() {
  const q = normalizar(document.getElementById('prat-search').value.trim());
  if (!q) { renderDetalhe(itensSecaoAtiva); return; }
  const termos = q.split(' ').filter(t => t.length > 0);
  const filtrado = itensSecaoAtiva.filter(p => {
    const n = normalizar(p.nome);
    const l = normalizar(p.localizacao || '');
    return termos.every(t => n.includes(t) || l.includes(t));
  });
  renderDetalhe(filtrado);
}

function renderDetalhe(lista) {
  const el = document.getElementById('prat-lista');
  if (!lista.length) { el.innerHTML = '<div class="empty-msg">Nenhum produto encontrado.</div>'; return; }

  // Agrupar por sub-localização exata
  const grupos = {};
  lista.forEach(p => {
    const loc = p.localizacao || '—';
    if (!grupos[loc]) grupos[loc] = [];
    grupos[loc].push(p);
  });

  const temGrupos = Object.keys(grupos).length > 1;
  let html = '';
  Object.keys(grupos).sort(naturalSort).forEach(loc => {
    if (temGrupos) html += `<div class="subloc-titulo">📍 ${loc}</div>`;
    grupos[loc].forEach(p => {
      const preco = p.preco && p.preco > 0 ? `<span class="prat-item-preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</span>` : '';
      const locTag = !temGrupos ? `<span class="prat-item-loc">${p.localizacao || '—'}</span>` : '';
      const jaAdicionado = pedidos[pedidoAtual] && pedidos[pedidoAtual].some(x => x.nome === p.nome);
      const btnClass = jaAdicionado ? 'prat-add-btn adicionado' : 'prat-add-btn';
      const btnLabel = jaAdicionado ? '✓' : '+';
      html += `<div class="prat-item">
        <div class="prat-item-body">
          <div class="prat-item-nome">${p.nome}</div>
          <div class="prat-item-footer">${locTag}${preco}</div>
        </div>
        <button class="${btnClass}" onclick="adicionarDaPrateleira(this, '${p.nome.replace(/'/g, "\\'")}')">  ${btnLabel}</button>
      </div>`;
    });
  });
  el.innerHTML = html;
}

// ---- ESTOQUE ----
function buscarEstoque() {
  const q = normalizar(document.getElementById("search1").value.trim());
  const lista = document.getElementById("lista1");
  const countEl = document.getElementById("resultado-count");
  lista.innerHTML = "";
  if (!q) { countEl.textContent = ""; return; }
  const termos = q.split(" ").filter(t => t.length > 0);
  const resultado = dados.filter(i => {
    return termos.every(t => normalizar(i.nome).includes(t) || normalizar(i.localizacao || '').includes(t));
  });
  countEl.textContent = resultado.length + ' resultado' + (resultado.length !== 1 ? 's' : '');
  resultado.slice(0, 80).forEach(i => {
    const d = document.createElement("div");
    d.className = "item";
    const loc = i.localizacao && i.localizacao !== 'nan' ? `<span class="loc-badge">${i.localizacao}</span>` : '<span style="color:#bbb;font-size:12px">sem localização</span>';
    const preco = i.preco && i.preco > 0 ? `<div class="item-preco">R$ ${i.preco.toFixed(2).replace('.', ',')}</div>` : '';
    d.innerHTML = `<div class="item-nome">${i.nome}</div><div class="item-loc">${loc}</div>${preco}`;
    lista.appendChild(d);
  });
  if (resultado.length > 80) {
    const m = document.createElement("div");
    m.className = "empty-msg";
    m.textContent = `+ ${resultado.length - 80} resultados. Refine a busca.`;
    lista.appendChild(m);
  }
}

// ---- PEDIDOS ----
function iniciar() {
  pedidos = JSON.parse(localStorage.getItem("rm_pedidos") || '{"Pedido 1":[]}');
  pedidoAtual = localStorage.getItem("rm_pedidoAtual") || Object.keys(pedidos)[0] || "Pedido 1";
  if (!pedidos[pedidoAtual]) pedidoAtual = Object.keys(pedidos)[0];
  salvar(); atualizarChips(); atualizarPedido();
}

function salvar() {
  localStorage.setItem("rm_pedidos", JSON.stringify(pedidos));
  localStorage.setItem("rm_pedidoAtual", pedidoAtual);
}

function mudarView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('nav-' + view).classList.add('active');
  if (view === 'pedidos') { document.getElementById('search2').value = ''; document.getElementById('lista2').innerHTML = ''; }
}

function buscarPedidos() {
  const q = normalizar(document.getElementById("search2").value.trim());
  const lista = document.getElementById("lista2");
  lista.innerHTML = "";
  if (!q) return;
  const termos = q.split(" ").filter(t => t.length > 0);
  dados.filter(i => termos.every(t => normalizar(i.nome).includes(t) || normalizar(i.localizacao || '').includes(t)))
    .slice(0, 50).forEach(i => {
      const d = document.createElement("div");
      d.className = "item";
      const loc = i.localizacao && i.localizacao !== 'nan' ? `<span class="loc-badge">${i.localizacao}</span>` : '<span style="color:#bbb;font-size:12px">sem loc.</span>';
      d.innerHTML = `<div class="item-nome">${i.nome}</div><div class="item-loc">${loc}</div>`;
      d.onclick = () => adicionarPedido(i);
      lista.appendChild(d);
    });
}

function atualizarChips() {
  const box = document.getElementById("pedido-chips");
  box.innerHTML = "";
  Object.keys(pedidos).forEach(nome => {
    const c = document.createElement("div");
    c.className = "pedido-chip" + (nome === pedidoAtual ? " active" : "");
    c.textContent = nome + " (" + pedidos[nome].length + ")";
    c.onclick = () => trocarPedido(nome);
    box.appendChild(c);
  });
}

function trocarPedido(n) { pedidoAtual = n; salvar(); atualizarChips(); atualizarPedido(); }

function criarPedido() {
  let num = Object.keys(pedidos).length + 1;
  let nome = "Pedido " + num;
  while (pedidos[nome]) nome = "Pedido " + (++num);
  pedidos[nome] = [];
  salvar(); trocarPedido(nome);
}

function abrirRenomear() {
  document.getElementById('input-renomear').value = pedidoAtual;
  document.getElementById('modal-renomear').classList.add('open');
  setTimeout(() => document.getElementById('input-renomear').focus(), 100);
}
function fecharRenomear() { document.getElementById('modal-renomear').classList.remove('open'); }
function confirmarRenomear() {
  const novoNome = document.getElementById('input-renomear').value.trim();
  if (!novoNome || novoNome === pedidoAtual) { fecharRenomear(); return; }
  if (pedidos[novoNome]) { alert('Já existe um pedido com esse nome.'); return; }
  const itens = pedidos[pedidoAtual];
  delete pedidos[pedidoAtual];
  pedidos[novoNome] = itens;
  pedidoAtual = novoNome;
  salvar(); atualizarChips(); atualizarPedido(); fecharRenomear();
}

function excluirPedidoAtual() {
  if (Object.keys(pedidos).length <= 1) { alert('Você precisa ter pelo menos um pedido.'); return; }
  if (!confirm('Excluir pedido "' + pedidoAtual + '"?')) return;
  delete pedidos[pedidoAtual];
  pedidoAtual = Object.keys(pedidos)[0];
  salvar(); atualizarChips(); atualizarPedido();
}

function adicionarPedido(item) {
  if (!pedidos[pedidoAtual].some(p => p.nome === item.nome)) { pedidos[pedidoAtual].push(item); salvar(); }
  document.getElementById("search2").value = "";
  document.getElementById("lista2").innerHTML = "";
  atualizarChips(); atualizarPedido();
}

function atualizarPedido() {
  document.getElementById("nomePedidoAtual").textContent = pedidoAtual;
  const lista = pedidos[pedidoAtual] || [];
  const box = document.getElementById("pedidoLista");
  if (!lista.length) { box.innerHTML = '<div class="pedido-vazio">Nenhuma peça adicionada.<br>Use a busca acima para adicionar.</div>'; return; }
  box.innerHTML = lista.map((i, idx) => {
    const loc = i.localizacao && i.localizacao !== 'nan' ? i.localizacao : '—';
    return `<div class="pedido-linha">
      <span class="pedido-linha-num">${idx + 1}.</span>
      <div style="flex:1"><div class="pedido-linha-nome">${i.nome}</div><div class="pedido-linha-loc">${loc}</div></div>
      <button class="remover-btn" onclick="removerItem(${idx})">remover</button>
    </div>`;
  }).join('');
}

function removerItem(i) { pedidos[pedidoAtual].splice(i, 1); salvar(); atualizarChips(); atualizarPedido(); }

function copiarPedido() {
  const lista = pedidos[pedidoAtual];
  if (!lista.length) { alert('O pedido está vazio.'); return; }
  const txt = lista.map((i, idx) => `${idx + 1}) ${i.nome} - ${i.localizacao && i.localizacao !== 'nan' ? i.localizacao : 'sem localização'}`).join("\n");
  navigator.clipboard.writeText(txt).then(() => alert('Pedido copiado!')).catch(() => prompt('Copie o texto abaixo:', txt));
}

function limparPedido() {
  if (!confirm('Limpar todos os itens do pedido atual?')) return;
  pedidos[pedidoAtual] = []; salvar(); atualizarChips(); atualizarPedido();
}

function excluirTodosPedidos() {
  if (!confirm('Excluir TODOS os pedidos?')) return;
  pedidos = { "Pedido 1": [] }; pedidoAtual = "Pedido 1";
  salvar(); atualizarChips(); atualizarPedido();
}

document.getElementById('modal-renomear').addEventListener('click', function(e) {
  if (e.target === this) fecharRenomear();
});// ---- MOTOS ----
let motos = JSON.parse(localStorage.getItem("rm_motos") || '[]');
let motoEditId = null;

function salvarMotos() {
  localStorage.setItem("rm_motos", JSON.stringify(motos));
}

function toggleFormMoto() {
  motoEditId = null;
  document.getElementById('form-moto-titulo').textContent = 'Nova moto';
  ['m-modelo','m-placa','m-cliente','m-tel','m-desc'].forEach(id => document.getElementById(id).value = '');
  const form = document.getElementById('form-nova-moto');
  form.classList.toggle('open');
  if (form.classList.contains('open')) document.getElementById('m-desc').focus();
}

function fecharFormMoto() {
  document.getElementById('form-nova-moto').classList.remove('open');
  motoEditId = null;
}

function salvarMoto() {
  const modelo = document.getElementById('m-modelo').value.trim();
  const cliente = document.getElementById('m-cliente').value.trim();
  if (!modelo || !cliente) { alert('Preencha pelo menos o modelo e o cliente.'); return; }
  const dados = {
    modelo,
    placa: document.getElementById('m-placa').value.trim(),
    cliente,
    tel: document.getElementById('m-tel').value.trim(),
    desc: document.getElementById('m-desc').value.trim(),
    status: 'pendente',
    data: motoEditId ? motos.find(m => m.id === motoEditId).data : Date.now(),
    id: motoEditId || Date.now()
  };
  if (motoEditId) {
    const idx = motos.findIndex(m => m.id === motoEditId);
    motos[idx] = { ...motos[idx], ...dados };
  } else {
    motos.unshift(dados);
  }
  salvarMotos();
  fecharFormMoto();
  renderMotos();
}

function editarMoto(id) {
  const m = motos.find(x => x.id === id);
  if (!m) return;
  motoEditId = id;
  document.getElementById('form-moto-titulo').textContent = 'Editar moto';
  document.getElementById('m-modelo').value = m.modelo || '';
  document.getElementById('m-placa').value = m.placa || '';
  document.getElementById('m-cliente').value = m.cliente || '';
  document.getElementById('m-tel').value = m.tel || '';
  document.getElementById('m-desc').value = m.desc || '';
  const form = document.getElementById('form-nova-moto');
  form.classList.add('open');
  form.scrollIntoView({ behavior: 'smooth' });
}

function excluirMoto(id) {
  if (!confirm('Excluir esta moto?')) return;
  motos = motos.filter(m => m.id !== id);
  salvarMotos();
  renderMotos();
}

function toggleStatusMoto(id) {
  const m = motos.find(x => x.id === id);
  if (!m) return;
  m.status = m.status === 'pendente' ? 'pronto' : 'pendente';
  salvarMotos();
  renderMotos();
}

function renderMotos() {
  const el = document.getElementById('moto-lista');
  if (!motos.length) {
    el.innerHTML = '<div class="moto-empty">Nenhuma moto cadastrada.<br>Toque em <strong>+ Nova moto</strong> para começar.</div>';
    return;
  }
  el.innerHTML = motos.map(m => {
    const data = new Date(m.data).toLocaleDateString('pt-BR');
    const statusLabel = m.status === 'pronto' ? 'Pronto ✓' : 'Pendente';
    const telLink = m.tel ? `<div class="moto-tel" onclick="ligarCliente('${m.tel}')">💬 WhatsApp: ${m.tel}</div>` : '';
    const placa = m.placa ? ` · ${m.placa}` : '';
    return `<div class="moto-card">
      <div class="moto-card-top">
        <div>
          <div class="moto-modelo">${m.modelo}${placa}</div>
          <div class="moto-cliente">${m.cliente}</div>
          ${telLink}
        </div>
        <span class="moto-status ${m.status}" onclick="toggleStatusMoto(${m.id})">${statusLabel}</span>
      </div>
      ${m.desc ? `<div class="moto-desc">${m.desc}</div>` : ''}
      <div class="moto-footer">
        <span class="moto-data">${data}</span>
        <div class="moto-acoes">
          <button class="btn" style="font-size:12px;padding:5px 10px" onclick="editarMoto(${m.id})">Editar</button>
          <button class="btn btn-red" style="font-size:12px;padding:5px 10px" onclick="excluirMoto(${m.id})">Excluir</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function ligarCliente(tel) {
  const num = '55' + tel.replace(/\D/g, '');
  window.location.href = 'https://wa.me/' + num;
}

renderMotos();

</script>
